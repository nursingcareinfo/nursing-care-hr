<div class="row">
  <div class="col-md-8">
    <h2><?= ctx.resource.name ?></h2>
    <p class="text-muted"><?= ctx.resource.assignedId ?></p>
  </div>
  <div class="col-md-4 text-end">
    <span class="badge bg-<?= ctx.resource.status === 'active' ? 'success' : ctx.resource.status === 'on-leave' ? 'warning' : 'secondary' ?> fs-6">
      <?= ctx.resource.status ?>
    </span>
  </div>
</div>

<table class="table table-bordered mt-3">
  <tr>
    <th width="30%">Father/Husband Name</th>
    <td><?= ctx.resource.fatherHusbandName || '-' ?></td>
  </tr>
  <tr>
    <th>Date of Birth</th>
    <td><?= ctx.resource.dateOfBirth || '-' ?></td>
  </tr>
  <tr>
    <th>Gender</th>
    <td><?= ctx.resource.gender || '-' ?></td>
  </tr>
  <tr>
    <th>CNIC</th>
    <td><?= ctx.resource.cnic || '-' ?></td>
  </tr>
  <tr>
    <th>Designation</th>
    <td><?= ctx.resource.designation || '-' ?></td>
  </tr>
  <tr>
    <th>Contact 1</th>
    <td><?= ctx.resource.contact1 || '-' ?></td>
  </tr>
  <tr>
    <th>Contact 2</th>
    <td><?= ctx.resource.contact2 || '-' ?></td>
  </tr>
  <tr>
    <th>District</th>
    <td><?= ctx.resource.district || '-' ?></td>
  </tr>
  <tr>
    <th>Hire Date</th>
    <td><?= ctx.resource.hireDate || '-' ?></td>
  </tr>
  <tr>
    <th>Created At</th>
    <td><?= ctx.resource.createdAt || '-' ?></td>
  </tr>
  <? if (ctx.resource.notes) { ?>
  <tr>
    <th>Notes</th>
    <td><?= ctx.resource.notes ?></td>
  </tr>
  <? } ?>
</table>

<div class="mt-3">
  <a href="<?= ctx.editLink ?>" class="btn btn-primary">Edit</a>
  <a href="<?= ctx.deleteLink ?>" class="btn btn-danger" onclick="return confirm('Are you sure you want to delete this staff member?')">Delete</a>
  <a href="/admin/staff/list" class="btn btn-secondary">Back to List</a>
</div>
